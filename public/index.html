<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地图扩张可视化</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2em;
      background: linear-gradient(90deg, #00d4ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: #8892b0;
      margin-bottom: 30px;
      font-size: 0.95em;
    }

    .main-content {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    .map-container {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    #map {
      width: 100%;
      height: 550px;
    }

    .province {
      stroke: rgba(255, 255, 255, 0.3);
      stroke-width: 1px;
      cursor: pointer;
      transition: stroke 0.3s ease;
    }

    .province:hover {
      stroke: #fff;
      stroke-width: 2px;
    }

    .sidebar {
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .panel h3 {
      font-size: 1em;
      margin-bottom: 15px;
      color: #00d4ff;
    }

    .factor-display {
      text-align: center;
      margin-bottom: 20px;
    }

    .factor-value {
      font-size: 3em;
      font-weight: bold;
      background: linear-gradient(90deg, #00d4ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .factor-label {
      color: #8892b0;
      font-size: 0.9em;
    }

    .slider-container {
      margin-bottom: 20px;
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #00ff88);
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(0, 212, 255, 0.5);
      transition: transform 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #00ff88);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 10px rgba(0, 212, 255, 0.5);
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.8em;
      color: #8892b0;
    }

    .control-buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      cursor: pointer;
      font-size: 0.85em;
      transition: all 0.3s;
    }

    .btn:hover {
      background: rgba(0, 212, 255, 0.2);
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #00ff88);
      color: #000;
      font-weight: 600;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .legend-gradient {
      height: 20px;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.75em;
      color: #8892b0;
    }

    .province-list {
      max-height: 250px;
      overflow-y: auto;
    }

    .province-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.85em;
    }

    .province-item:last-child {
      border-bottom: none;
    }

    .province-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .province-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    .province-expansion {
      color: #00ff88;
      font-weight: 600;
    }

    .tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 1000;
      border: 1px solid rgba(0, 212, 255, 0.3);
    }

    .tooltip h4 {
      margin-bottom: 6px;
      color: #00d4ff;
      font-size: 1em;
    }

    .tooltip p {
      margin: 3px 0;
      color: #ccc;
    }

    .tooltip strong {
      color: #00ff88;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.5);
    }

    .file-upload {
      margin-bottom: 15px;
    }

    .file-upload label {
      display: block;
      width: 100%;
      padding: 12px;
      text-align: center;
      background: rgba(0, 212, 255, 0.1);
      border: 2px dashed rgba(0, 212, 255, 0.3);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85em;
      transition: all 0.3s;
    }

    .file-upload label:hover {
      background: rgba(0, 212, 255, 0.2);
      border-color: rgba(0, 212, 255, 0.6);
    }

    .file-upload input[type="file"] {
      display: none;
    }

    .formula-section {
      margin-bottom: 15px;
    }

    .formula-label {
      font-size: 0.85em;
      color: #8892b0;
      margin-bottom: 8px;
    }

    .formula-input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #00ff88;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.9em;
      outline: none;
      transition: border-color 0.3s;
    }

    .formula-input:focus {
      border-color: #00d4ff;
    }

    .formula-input.error {
      border-color: #ff4757;
      background: rgba(255, 71, 87, 0.1);
    }

    .formula-hint {
      font-size: 0.75em;
      color: #8892b0;
      margin-top: 6px;
      line-height: 1.5;
    }

    .formula-hint code {
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 5px;
      border-radius: 3px;
      color: #00d4ff;
    }

    .play-options {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      align-items: center;
    }

    .play-options label {
      font-size: 0.8em;
      color: #8892b0;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .play-options input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #00d4ff;
    }

    .file-name {
      font-size: 0.8em;
      color: #00ff88;
      margin-top: 8px;
      text-align: center;
      word-break: break-all;
    }

    .error-message {
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid rgba(255, 71, 87, 0.3);
      color: #ff6b7a;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.85em;
      margin-top: 10px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .panel-header h3 {
      margin-bottom: 0;
    }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .speed-control label {
      font-size: 0.8em;
      color: #8892b0;
    }

    .speed-control input[type="range"] {
      flex: 1;
      height: 4px;
    }

    .speed-control input[type="range"]::-webkit-slider-thumb {
      width: 14px;
      height: 14px;
    }

    .speed-value {
      font-size: 0.8em;
      color: #00d4ff;
      min-width: 40px;
      text-align: right;
    }

    .sidebar {
      width: 320px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗺️ 地图扩张可视化</h1>
    <p class="subtitle">拖动时间轴滑块，观察各省份根据人口密度的扩张效果</p>
    
    <div class="main-content">
      <div class="map-container">
        <svg id="map"></svg>
      </div>
      
      <div class="sidebar">
        <div class="panel">
          <h3>📁 加载地图</h3>
          <div class="file-upload">
            <label for="geojsonFile">
              📤 点击上传 GeoJSON 文件
            </label>
            <input type="file" id="geojsonFile" accept=".geojson,.json">
          </div>
          <div class="file-name" id="fileName">当前: 中国省份示例数据</div>
          <div class="error-message" id="fileError"></div>
          <button class="btn" id="loadDefaultBtn" style="width: 100%; margin-top: 10px;">
            🔄 加载默认数据
          </button>
        </div>

        <div class="panel">
          <h3>🧮 公式编辑器</h3>
          <div class="formula-section">
            <div class="formula-label">扩张系数计算公式:</div>
            <input type="text" id="formulaInput" class="formula-input" 
                   value="1 + (normalized * factor / 100) * 0.8">
            <div class="formula-hint">
              可用变量: <code>factor</code> (0-100), <code>value</code> (原始属性值), <code>normalized</code> (归一化后的值)<br>
              示例: <code>1 + value * factor / 1000</code>
            </div>
            <div class="formula-section">
              <div class="formula-label" style="margin-top: 12px;">属性字段名:</div>
              <input type="text" id="propertyInput" class="formula-input" 
                     value="density" placeholder="如: density, population, area">
              <div class="formula-hint">
                GeoJSON properties 中用于计算的字段名
              </div>
            </div>
            <div class="error-message" id="formulaError"></div>
          </div>
        </div>

        <div class="panel">
          <h3>🎚️ 影响因子</h3>
          <div class="factor-display">
            <div class="factor-value" id="factorValue">0</div>
            <div class="factor-label">扩张影响因子</div>
          </div>
          <div class="slider-container">
            <input type="range" id="factorSlider" min="0" max="100" value="0" step="1">
            <div class="slider-labels">
              <span>0</span>
              <span>50</span>
              <span>100</span>
            </div>
          </div>
          <div class="control-buttons">
            <button class="btn" id="resetBtn">重置</button>
            <button class="btn btn-primary" id="playBtn">▶ 播放</button>
          </div>
          <div class="play-options">
            <label>
              <input type="checkbox" id="loopPlay" checked> 循环播放
            </label>
          </div>
          <div class="speed-control">
            <label>速度:</label>
            <input type="range" id="speedSlider" min="10" max="200" value="50">
            <span class="speed-value" id="speedValue">50ms</span>
          </div>
        </div>
        
        <div class="panel">
          <h3>🎨 图例</h3>
          <div class="legend-gradient" id="legendGradient"></div>
          <div class="legend-labels">
            <span>低扩张</span>
            <span>高扩张</span>
          </div>
        </div>
        
        <div class="panel">
          <h3>📊 省份列表</h3>
          <div class="province-list" id="provinceList"></div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="tooltip" id="tooltip"></div>

  <script>
    const width = 800;
    const height = 550;
    
    const svg = d3.select('#map')
      .attr('viewBox', `0 0 ${width} ${height}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');
    
    const g = svg.append('g');
    
    const tooltip = d3.select('#tooltip');
    
    const colorScale = d3.scaleSequential()
      .domain([1, 1.8])
      .interpolator(d3.interpolateViridis);
    
    const projection = d3.geoIdentity();
    
    const geoPath = d3.geoPath().projection(projection);
    
    let geojsonData = null;
    let expansionData = {};
    let isPlaying = false;
    let playInterval = null;
    let provinceCentroids = {};
    let updateFactorTimeout = null;
    let isDragging = false;
    let propertyName = 'density';
    let formula = '1 + (normalized * factor / 100) * 0.8';
    let playSpeed = 50;
    let loopPlay = true;
    let dataStats = { min: 0, max: 0, range: 0 };
    
    const legendGradient = document.getElementById('legendGradient');
    legendGradient.style.background = 'linear-gradient(to right, #440154, #482878, #3e4989, #31688e, #26828e, #1f9e89, #35b779, #6ece58, #b5de2b, #fde725)';
    
    function safeEvalFormula(formulaStr, factor, value, normalized) {
      try {
        const allowedChars = /^[0-9+\-*/().\sfactorvaluenormalized,]+$/;
        if (!allowedChars.test(formulaStr)) {
          throw new Error('公式包含非法字符，只允许数字、运算符和变量名');
        }
        
        const func = new Function('factor', 'value', 'normalized', `
          'use strict';
          return (${formulaStr});
        `);
        
        const result = func(factor, value, normalized);
        
        if (typeof result !== 'number' || !isFinite(result) || isNaN(result)) {
          throw new Error('计算结果无效');
        }
        
        return result;
      } catch (err) {
        console.warn('Formula calculation error:', err.message, 'formula:', formulaStr);
        return 1;
      }
    }
    
    function calculateDataStats() {
      if (!geojsonData || !geojsonData.features) return;
      
      const values = geojsonData.features
        .map(f => Number(f.properties[propertyName]) || 0)
        .filter(v => isFinite(v));
      
      if (values.length === 0) {
        dataStats = { min: 0, max: 0, range: 0 };
        return;
      }
      
      dataStats.min = Math.min(...values);
      dataStats.max = Math.max(...values);
      dataStats.range = dataStats.max - dataStats.min;
    }
    
    function calculateExpansionLocal(factor) {
      const clampedFactor = Math.max(0, Math.min(100, Number(factor) || 0));
      const expansions = {};
      
      calculateDataStats();
      
      geojsonData.features.forEach(feature => {
        const rawValue = Number(feature.properties[propertyName]) || 0;
        let normalized = 0;
        
        if (dataStats.range > 0 && isFinite(dataStats.range)) {
          normalized = (rawValue - dataStats.min) / dataStats.range;
        }
        
        normalized = Math.max(0, Math.min(1, normalized));
        
        let expansion = safeEvalFormula(formula, clampedFactor, rawValue, normalized);
        
        if (!isFinite(expansion) || isNaN(expansion)) {
          expansion = 1;
        }
        
        expansion = Math.max(0.1, Math.min(3, expansion));
        
        const name = feature.properties.name || feature.properties.id || 'Unknown';
        
        expansions[name] = {
          expansion: expansion,
          value: rawValue,
          normalized: normalized
        };
      });
      
      return {
        factor: clampedFactor,
        expansions: expansions
      };
    }
    
    function showError(elementId, message) {
      const el = document.getElementById(elementId);
      if (el) {
        el.textContent = message;
        el.classList.add('show');
      }
    }
    
    function hideError(elementId) {
      const el = document.getElementById(elementId);
      if (el) {
        el.textContent = '';
        el.classList.remove('show');
      }
    }
    
    function validateFormula() {
      const formulaInput = document.getElementById('formulaInput');
      formula = formulaInput.value.trim();
      
      try {
        const testResult = safeEvalFormula(formula, 50, 100, 0.5);
        if (!isFinite(testResult) || isNaN(testResult)) {
          throw new Error('计算结果无效');
        }
        formulaInput.classList.remove('error');
        hideError('formulaError');
        return true;
      } catch (err) {
        formulaInput.classList.add('error');
        showError('formulaError', '公式错误: ' + err.message);
        return false;
      }
    }
    
    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          
          if (!data.type || data.type !== 'FeatureCollection' || !Array.isArray(data.features)) {
            throw new Error('无效的 GeoJSON 格式，请确保是 FeatureCollection');
          }
          
          if (data.features.length === 0) {
            throw new Error('GeoJSON 不包含任何要素');
          }
          
          const firstProps = data.features[0].properties || {};
          const availableProps = Object.keys(firstProps);
          
          if (availableProps.length === 0) {
            throw new Error('GeoJSON 要素不包含任何属性字段');
          }
          
          geojsonData = data;
          document.getElementById('fileName').textContent = '当前: ' + file.name;
          hideError('fileError');
          
          if (availableProps.includes(propertyName)) {
          } else {
            propertyName = availableProps[0];
            document.getElementById('propertyInput').value = propertyName;
          }
          
          initializeGeoJSON();
          
        } catch (err) {
          console.error('File load error:', err);
          showError('fileError', '文件加载失败: ' + err.message);
        }
      };
      
      reader.onerror = function() {
        showError('fileError', '文件读取失败');
      };
      
      reader.readAsText(file);
      event.target.value = '';
    }
    
    function initializeGeoJSON() {
      if (!geojsonData) return;
      
      g.selectAll('.province').remove();
      provinceCentroids = {};
      expansionData = {};
      
      projection
        .reflectY(true)
        .fitSize([width - 40, height - 40], geojsonData);
      
      geojsonData.features.forEach(feature => {
        const name = feature.properties.name || feature.properties.id || 'Unknown';
        try {
          provinceCentroids[name] = geoPath.centroid(feature);
        } catch (err) {
          provinceCentroids[name] = [width / 2, height / 2];
        }
      });
      
      calculateDataStats();
      renderMap();
      
      const currentFactor = document.getElementById('factorSlider').value;
      calculateAndUpdate(currentFactor, false);
    }
    
    async function loadGeoJSON() {
      try {
        const response = await fetch('/api/geojson');
        geojsonData = await response.json();
        document.getElementById('fileName').textContent = '当前: 中国省份示例数据';
        initializeGeoJSON();
      } catch (err) {
        console.error('Failed to load default GeoJSON:', err);
        showError('fileError', '加载默认数据失败');
      }
    }
    
    function calculateAndUpdate(value, animate = true) {
      document.getElementById('factorValue').textContent = Math.round(value);
      
      if (!validateFormula()) {
        return;
      }
      
      const data = calculateExpansionLocal(value);
      if (data && data.expansions) {
        expansionData = data.expansions;
        updateMap(animate);
        updateProvinceList();
      }
    }
    
    function renderMap() {
      const paths = g.selectAll('.province')
        .data(geojsonData.features, d => d.properties.name || d.properties.id);
      
      paths.enter()
        .append('path')
        .attr('class', 'province')
        .attr('d', geoPath)
        .attr('fill', '#440154')
        .on('mouseover', function(event, d) {
          const name = d.properties.name || d.properties.id || 'Unknown';
          const info = expansionData[name] || { expansion: 1, value: d.properties[propertyName] };
          let expansion = Number(info.expansion);
          if (!isFinite(expansion) || isNaN(expansion)) {
            expansion = 1;
          }
          const value = Number(info.value) || 0;
          tooltip
            .style('opacity', 1)
            .html(`
              <h4>${name}</h4>
              <p>${propertyName}: <strong>${value}</strong></p>
              <p>扩张系数: <strong>${expansion.toFixed(3)}</strong></p>
            `);
        })
        .on('mousemove', function(event) {
          tooltip
            .style('left', (event.pageX + 15) + 'px')
            .style('top', (event.pageY - 10) + 'px');
        })
        .on('mouseout', function() {
          tooltip.style('opacity', 0);
        });
      
      paths.exit().remove();
    }
    
    function updateMap(animate = true) {
      g.selectAll('.province')
        .each(function(d) {
          const info = expansionData[d.properties.name];
          if (!info) return;
          
          const element = d3.select(this);
          let expansion = Number(info.expansion);
          const centroid = provinceCentroids[d.properties.name];
          
          if (!isFinite(expansion) || isNaN(expansion)) {
            expansion = 1;
          }
          
          expansion = Math.max(0.1, Math.min(3, expansion));
          
          if (!centroid || !isFinite(centroid[0]) || !isFinite(centroid[1])) return;
          
          const tx = centroid[0] * (1 - expansion);
          const ty = centroid[1] * (1 - expansion);
          
          element.interrupt();
          
          if (animate) {
            element
              .attr('fill', colorScale(expansion))
              .transition()
              .duration(150)
              .ease(d3.easeLinear)
              .attr('transform', `translate(${tx}, ${ty}) scale(${expansion})`);
          } else {
            element
              .attr('fill', colorScale(expansion))
              .attr('transform', `translate(${tx}, ${ty}) scale(${expansion})`);
          }
        });
    }
    
    function updateProvinceList() {
      const list = document.getElementById('provinceList');
      list.innerHTML = '';
      
      const sortedProvinces = geojsonData.features
        .map(f => ({
          name: f.properties.name || f.properties.id || 'Unknown',
          value: Number(f.properties[propertyName]) || 0
        }))
        .sort((a, b) => b.value - a.value);
      
      sortedProvinces.forEach(province => {
        const info = expansionData[province.name] || { expansion: 1 };
        let expansion = Number(info.expansion);
        if (!isFinite(expansion) || isNaN(expansion)) {
          expansion = 1;
        }
        
        const item = document.createElement('div');
        item.className = 'province-item';
        item.innerHTML = `
          <div class="province-name">
            <div class="province-color" style="background: ${colorScale(expansion)}"></div>
            <span>${province.name}</span>
          </div>
          <div class="province-expansion">${expansion.toFixed(2)}x</div>
        `;
        list.appendChild(item);
      });
    }
    
    function updateFactor(value, animate = true) {
      calculateAndUpdate(value, animate);
    }
    
    function debouncedUpdateFactor(value) {
      if (updateFactorTimeout) {
        clearTimeout(updateFactorTimeout);
      }
      updateFactorTimeout = setTimeout(() => {
        updateFactor(value, true);
      }, 50);
    }
    
    const slider = document.getElementById('factorSlider');
    slider.addEventListener('input', function() {
      document.getElementById('factorValue').textContent = Math.round(this.value);
      debouncedUpdateFactor(this.value);
    });
    
    slider.addEventListener('mousedown', function() {
      isDragging = true;
    });
    
    slider.addEventListener('mouseup', function() {
      isDragging = false;
      updateFactor(this.value, true);
    });
    
    slider.addEventListener('touchstart', function() {
      isDragging = true;
    });
    
    slider.addEventListener('touchend', function() {
      isDragging = false;
      updateFactor(this.value, true);
    });
    
    document.getElementById('resetBtn').addEventListener('click', function() {
      slider.value = 0;
      updateFactor(0);
      stopPlay();
    });
    
    document.getElementById('playBtn').addEventListener('click', function() {
      if (isPlaying) {
        stopPlay();
      } else {
        startPlay();
      }
    });
    
    function startPlay() {
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸ 暂停';
      
      if (parseInt(slider.value) >= 100) {
        slider.value = 0;
      }
      
      playInterval = setInterval(() => {
        let current = parseInt(slider.value);
        if (current >= 100) {
          if (loopPlay) {
            slider.value = 0;
            updateFactor(0, false);
            return;
          } else {
            stopPlay();
            return;
          }
        }
        slider.value = current + 1;
        document.getElementById('factorValue').textContent = current + 1;
        debouncedUpdateFactor(current + 1);
      }, playSpeed);
    }
    
    function stopPlay() {
      isPlaying = false;
      document.getElementById('playBtn').textContent = '▶ 播放';
      if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
      }
    }
    
    document.getElementById('geojsonFile').addEventListener('change', handleFileUpload);
    
    document.getElementById('loadDefaultBtn').addEventListener('click', function() {
      loadGeoJSON();
    });
    
    document.getElementById('formulaInput').addEventListener('input', function() {
      if (validateFormula()) {
        const current = slider.value;
        updateFactor(current, false);
      }
    });
    
    document.getElementById('propertyInput').addEventListener('input', function() {
      const newProp = this.value.trim();
      if (newProp && geojsonData && geojsonData.features.length > 0) {
        const firstFeature = geojsonData.features[0];
        if (firstFeature.properties && firstFeature.properties.hasOwnProperty(newProp)) {
          propertyName = newProp;
          hideError('formulaError');
          this.classList.remove('error');
          calculateDataStats();
          const current = slider.value;
          updateFactor(current, false);
        } else {
          this.classList.add('error');
          const available = Object.keys(firstFeature.properties || {}).join(', ');
          showError('formulaError', `属性字段不存在。可用字段: ${available}`);
        }
      }
    });
    
    document.getElementById('loopPlay').addEventListener('change', function() {
      loopPlay = this.checked;
    });
    
    document.getElementById('speedSlider').addEventListener('input', function() {
      playSpeed = parseInt(this.value);
      document.getElementById('speedValue').textContent = playSpeed + 'ms';
      
      if (isPlaying) {
        clearInterval(playInterval);
        startPlay();
      }
    });
    
    loadGeoJSON();
  </script>
</body>
</html>
