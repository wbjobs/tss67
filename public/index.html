<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地图扩张可视化</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2em;
      background: linear-gradient(90deg, #00d4ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: #8892b0;
      margin-bottom: 30px;
      font-size: 0.95em;
    }

    .main-content {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    .map-container {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    #map {
      width: 100%;
      height: 550px;
    }

    .province {
      stroke: rgba(255, 255, 255, 0.3);
      stroke-width: 1px;
      cursor: pointer;
      transition: stroke 0.3s ease;
    }

    .province:hover {
      stroke: #fff;
      stroke-width: 2px;
    }

    .sidebar {
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .panel h3 {
      font-size: 1em;
      margin-bottom: 15px;
      color: #00d4ff;
    }

    .factor-display {
      text-align: center;
      margin-bottom: 20px;
    }

    .factor-value {
      font-size: 3em;
      font-weight: bold;
      background: linear-gradient(90deg, #00d4ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .factor-label {
      color: #8892b0;
      font-size: 0.9em;
    }

    .slider-container {
      margin-bottom: 20px;
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #00ff88);
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(0, 212, 255, 0.5);
      transition: transform 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #00ff88);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 10px rgba(0, 212, 255, 0.5);
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.8em;
      color: #8892b0;
    }

    .control-buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      cursor: pointer;
      font-size: 0.85em;
      transition: all 0.3s;
    }

    .btn:hover {
      background: rgba(0, 212, 255, 0.2);
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #00ff88);
      color: #000;
      font-weight: 600;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .legend-gradient {
      height: 20px;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.75em;
      color: #8892b0;
    }

    .province-list {
      max-height: 250px;
      overflow-y: auto;
    }

    .province-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.85em;
    }

    .province-item:last-child {
      border-bottom: none;
    }

    .province-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .province-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    .province-expansion {
      color: #00ff88;
      font-weight: 600;
    }

    .tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 1000;
      border: 1px solid rgba(0, 212, 255, 0.3);
    }

    .tooltip h4 {
      margin-bottom: 6px;
      color: #00d4ff;
      font-size: 1em;
    }

    .tooltip p {
      margin: 3px 0;
      color: #ccc;
    }

    .tooltip strong {
      color: #00ff88;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗺️ 地图扩张可视化</h1>
    <p class="subtitle">拖动时间轴滑块，观察各省份根据人口密度的扩张效果</p>
    
    <div class="main-content">
      <div class="map-container">
        <svg id="map"></svg>
      </div>
      
      <div class="sidebar">
        <div class="panel">
          <h3>🎚️ 影响因子</h3>
          <div class="factor-display">
            <div class="factor-value" id="factorValue">0</div>
            <div class="factor-label">扩张影响因子</div>
          </div>
          <div class="slider-container">
            <input type="range" id="factorSlider" min="0" max="100" value="0" step="1">
            <div class="slider-labels">
              <span>0</span>
              <span>50</span>
              <span>100</span>
            </div>
          </div>
          <div class="control-buttons">
            <button class="btn" id="resetBtn">重置</button>
            <button class="btn btn-primary" id="playBtn">▶ 播放</button>
          </div>
        </div>
        
        <div class="panel">
          <h3>🎨 图例</h3>
          <div class="legend-gradient" id="legendGradient"></div>
          <div class="legend-labels">
            <span>低扩张</span>
            <span>高扩张</span>
          </div>
        </div>
        
        <div class="panel">
          <h3>📊 省份列表</h3>
          <div class="province-list" id="provinceList"></div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="tooltip" id="tooltip"></div>

  <script>
    const width = 800;
    const height = 550;
    
    const svg = d3.select('#map')
      .attr('viewBox', `0 0 ${width} ${height}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');
    
    const g = svg.append('g');
    
    const tooltip = d3.select('#tooltip');
    
    const colorScale = d3.scaleSequential()
      .domain([1, 1.8])
      .interpolator(d3.interpolateViridis);
    
    const projection = d3.geoIdentity();
    
    const geoPath = d3.geoPath().projection(projection);
    
    let geojsonData = null;
    let expansionData = {};
    let isPlaying = false;
    let playInterval = null;
    let provinceCentroids = {};
    
    const legendGradient = document.getElementById('legendGradient');
    legendGradient.style.background = 'linear-gradient(to right, #440154, #482878, #3e4989, #31688e, #26828e, #1f9e89, #35b779, #6ece58, #b5de2b, #fde725)';
    
    async function loadGeoJSON() {
      const response = await fetch('/api/geojson');
      geojsonData = await response.json();
      
      projection
        .reflectY(true)
        .fitSize([width - 40, height - 40], geojsonData);
      
      geojsonData.features.forEach(feature => {
        provinceCentroids[feature.properties.name] = geoPath.centroid(feature);
      });
      
      renderMap();
      updateProvinceList();
    }
    
    async function fetchExpansion(factor) {
      const response = await fetch(`/api/expansion?factor=${factor}`);
      const data = await response.json();
      expansionData = data.expansions;
      return data;
    }
    
    function renderMap() {
      const paths = g.selectAll('.province')
        .data(geojsonData.features, d => d.properties.name);
      
      paths.enter()
        .append('path')
        .attr('class', 'province')
        .attr('d', geoPath)
        .attr('fill', '#440154')
        .on('mouseover', function(event, d) {
          const info = expansionData[d.properties.name] || { expansion: 1, density: d.properties.density };
          tooltip
            .style('opacity', 1)
            .html(`
              <h4>${d.properties.name}</h4>
              <p>人口密度: <strong>${info.density} 人/km²</strong></p>
              <p>扩张系数: <strong>${info.expansion.toFixed(3)}</strong></p>
            `);
        })
        .on('mousemove', function(event) {
          tooltip
            .style('left', (event.pageX + 15) + 'px')
            .style('top', (event.pageY - 10) + 'px');
        })
        .on('mouseout', function() {
          tooltip.style('opacity', 0);
        });
      
      paths.exit().remove();
    }
    
    function updateMap() {
      g.selectAll('.province')
        .each(function(d) {
          const info = expansionData[d.properties.name];
          if (!info) return;
          
          const element = d3.select(this);
          const expansion = info.expansion;
          const centroid = provinceCentroids[d.properties.name];
          
          if (!centroid || isNaN(centroid[0]) || isNaN(centroid[1])) return;
          
          const tx = centroid[0] * (1 - expansion);
          const ty = centroid[1] * (1 - expansion);
          
          element
            .attr('fill', colorScale(expansion))
            .transition()
            .duration(300)
            .attr('transform', `translate(${tx}, ${ty}) scale(${expansion})`);
        });
    }
    
    function updateProvinceList() {
      const list = document.getElementById('provinceList');
      list.innerHTML = '';
      
      const sortedProvinces = geojsonData.features
        .map(f => ({
          name: f.properties.name,
          density: f.properties.density
        }))
        .sort((a, b) => b.density - a.density);
      
      sortedProvinces.forEach(province => {
        const info = expansionData[province.name] || { expansion: 1 };
        const item = document.createElement('div');
        item.className = 'province-item';
        item.innerHTML = `
          <div class="province-name">
            <div class="province-color" style="background: ${colorScale(info.expansion)}"></div>
            <span>${province.name}</span>
          </div>
          <div class="province-expansion">${info.expansion.toFixed(2)}x</div>
        `;
        list.appendChild(item);
      });
    }
    
    async function updateFactor(value) {
      document.getElementById('factorValue').textContent = Math.round(value);
      await fetchExpansion(value);
      updateMap();
      updateProvinceList();
    }
    
    const slider = document.getElementById('factorSlider');
    slider.addEventListener('input', function() {
      updateFactor(this.value);
    });
    
    document.getElementById('resetBtn').addEventListener('click', function() {
      slider.value = 0;
      updateFactor(0);
      stopPlay();
    });
    
    document.getElementById('playBtn').addEventListener('click', function() {
      if (isPlaying) {
        stopPlay();
      } else {
        startPlay();
      }
    });
    
    function startPlay() {
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸ 暂停';
      
      if (parseInt(slider.value) >= 100) {
        slider.value = 0;
      }
      
      playInterval = setInterval(() => {
        let current = parseInt(slider.value);
        if (current >= 100) {
          stopPlay();
          return;
        }
        slider.value = current + 1;
        updateFactor(current + 1);
      }, 50);
    }
    
    function stopPlay() {
      isPlaying = false;
      document.getElementById('playBtn').textContent = '▶ 播放';
      if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
      }
    }
    
    loadGeoJSON();
  </script>
</body>
</html>
